name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install dependencies
        run: npm ci

      - name: Ensure webDir exists for Capacitor
        run: mkdir -p out

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --stacktrace 2>&1 | tee gradle-output.txt

      - name: Locate APK files
        run: |
          echo "=== Finding APKs ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found via find"
          echo "=== Check build dir ==="
          ls -la android/app/build/ 2>/dev/null || echo "No build dir"
          echo "=== outputs ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          echo "=== APKs in outputs ==="
          find android/app/build/outputs/ -name "*.apk" -type f 2>/dev/null || echo "No APKs in outputs"

      - name: Copy APK to workspace root
        run: |
          mkdir -p apk-artifact
          find . -name "*.apk" -type f -exec cp {} apk-artifact/ \; 2>/dev/null || echo "No APK to copy"
          ls -la apk-artifact/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-output
          path: android/gradle-output.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: luxwood-apk
          path: apk-artifact/
