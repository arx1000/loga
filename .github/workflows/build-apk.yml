name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install dependencies
        run: npm ci

      - name: Ensure webDir exists for Capacitor
        run: mkdir -p out

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --stacktrace 2>&1 | tee gradle-output.txt

      - name: Locate and package APK
        run: |
          echo "=== Finding APKs ===" >> android/gradle-output.txt
          find . -name "*.apk" -type f >> android/gradle-output.txt 2>&1
          echo "=== Build dir ===" >> android/gradle-output.txt
          ls -la android/app/build/ >> android/gradle-output.txt 2>&1
          echo "=== Build outputs ===" >> android/gradle-output.txt
          find android/app/build/ -type f >> android/gradle-output.txt 2>&1
          mkdir -p apk-artifact
          find . -name "*.apk" -type f -exec cp {} apk-artifact/ \; 2>/dev/null || true
          echo "=== APK artifact dir ===" >> android/gradle-output.txt
          ls -la apk-artifact/ >> android/gradle-output.txt 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-output
          path: android/gradle-output.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: luxwood-apk
          path: apk-artifact/
